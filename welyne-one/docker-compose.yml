version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: welyne-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: welyne-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: welyne-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: welyne-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
      - redis
    command: >
      sh -c "celery -A app.celery_app worker --loglevel=info --pool=solo"

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: welyne-beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
      - redis
    command: >
      sh -c "celery -A app.celery_app beat --loglevel=info"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: welyne-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3000:80"

volumes:
  pgdata:
  redisdata:
