version: "3.9"

# Base de données (Neon), Redis (Upstash) et observabilité (Langfuse Cloud)
# sont des services managés externes — pas de conteneurs locaux pour eux.
# Toutes les URLs de connexion viennent du .env (voir .env.example).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: welyne-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - storage:/app/storage
      # Sans ce volume, bge-m3 (~2.2 Go) était retéléchargé à CHAQUE
      # redémarrage de conteneur (docker compose up --build, restart, etc.),
      # bloquant le démarrage du serveur (préchargement synchrone, cf.
      # main.py) le temps du téléchargement à chaque fois.
      - hf_cache:/root/.cache/huggingface
    # Migration automatique avant de servir (spec Phase 0 : "docker compose
    # up -> login -> un appel LLM tracé" en UN SEUL geste).
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: welyne-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    volumes:
      - storage:/app/storage
      - hf_cache:/root/.cache/huggingface
    command: >
      sh -c "celery -A app.celery_app worker --loglevel=info --pool=solo"

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: welyne-beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    volumes:
      - storage:/app/storage
    command: >
      sh -c "celery -A app.celery_app beat --loglevel=info"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: welyne-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"

volumes:
  storage:
  hf_cache:
